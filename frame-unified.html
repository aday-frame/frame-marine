<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#090908;--bg2:#111110;--bg3:#1A1A18;--bg4:#222220;--bg5:#2A2A27;
  --txt:#EFEFE9;--txt2:#9A9A90;--txt3:#525248;--txt4:#38382F;
  --bd:rgba(255,255,255,.055);--bd2:rgba(255,255,255,.1);--bd3:rgba(255,255,255,.16);
  --grn:#4ADE80;--gbg:rgba(74,222,128,.1);--gbd:rgba(74,222,128,.25);
  --red:#F87171;--rbg:rgba(248,113,113,.1);--rbd:rgba(248,113,113,.3);
  --yel:#FACC15;--ybg:rgba(250,204,21,.1);--ybd:rgba(250,204,21,.25);
  --blu:#60A5FA;--bbg:rgba(96,165,250,.1);--bbd:rgba(96,165,250,.25);
  --pur:#A78BFA;--pbg:rgba(167,139,250,.1);--pbd:rgba(167,139,250,.25);
  --or:#F97316;--orbg:rgba(249,115,22,.1);--orbd:rgba(249,115,22,.25);
  /* module accent */
  --acc:#F97316;--acc-dim:rgba(249,115,22,.1);--acc-bd:rgba(249,115,22,.25);
  --font-mono:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--black);color:var(--txt);font-family:'DM Sans',-apple-system,sans-serif;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{height:52px;background:var(--bg2);border-bottom:.5px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:50;position:relative}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.lm{width:28px;height:28px;border-radius:6px;display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:5px;flex-shrink:0}
.lm s{border-radius:1px;display:block;text-decoration:none;background:#090908}
.lm s:nth-child(2){opacity:.5}.lm s:nth-child(3){opacity:.5}.lm s:nth-child(4){opacity:.2}
.tb-wordmark{font-size:15px;font-weight:600;color:var(--txt);letter-spacing:-.02em}
.tb-divider{width:.5px;height:22px;background:var(--bd2);flex-shrink:0}
/* property picker */
.tb-prop{display:flex;align-items:center;gap:7px;padding:5px 11px;background:var(--bg3);border:.5px solid var(--bd2);border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0;position:relative}
.tb-prop:hover{border-color:var(--acc-bd)}
.tb-prop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tb-prop-name{font-weight:500;color:var(--txt)}
.tb-prop-arrow{color:var(--txt3);font-size:10px;margin-left:2px}
/* module tabs */
.tb-modules{display:flex;gap:2px;flex-shrink:0}
.tb-mod{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--txt3);border:.5px solid transparent;white-space:nowrap}
.tb-mod:hover{color:var(--txt2);background:var(--bg3)}
.tb-mod.active{color:var(--acc);background:var(--acc-dim);border-color:var(--acc-bd)}
.tb-mod-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tb-mod.locked{opacity:.4;cursor:default}
.tb-mod.locked:hover{background:transparent;color:var(--txt3)}
/* right side */
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-role-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg3);border:.5px solid var(--bd2);border-radius:20px;font-size:11px;color:var(--txt2);cursor:pointer;transition:all .15s}
.tb-role-pill:hover{border-color:var(--acc-bd);color:var(--acc)}
.tb-icon-btn{width:30px;height:30px;border-radius:7px;background:var(--bg3);border:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;position:relative}
.tb-icon-btn:hover{border-color:var(--bd2)}
.tb-notif-dot{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--red);border:1.5px solid var(--bg2)}
.tb-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#090908;cursor:pointer;flex-shrink:0}
/* new btn */
.tb-new{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}

/* ── SHELL ── */
.shell{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:196px;background:var(--bg2);border-right:.5px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 6px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.nlbl{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.1em;padding:10px 8px 4px;font-weight:600}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;font-size:13px;color:var(--txt2);cursor:pointer;transition:all .12s;margin-bottom:1px;user-select:none;position:relative}
.ni:hover{background:var(--bg3);color:var(--txt)}
.ni.on{background:var(--acc-dim);color:var(--acc);font-weight:500}
.ni svg{width:13px;height:13px;flex-shrink:0;opacity:.7}
.ni.on svg{opacity:1}
.ni-ct{margin-left:auto;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;line-height:16px}
.ni-ct-red{background:var(--red);color:#fff}
.ni-ct-acc{background:var(--acc-dim);color:var(--acc)}
.sb-phase{padding:6px 8px;margin:4px 0}
.sb-phase-lbl{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:4px}
.sb-phase-track{display:flex;align-items:center;gap:3px}
.sb-phase-step{height:3px;flex:1;border-radius:2px;background:var(--bg4)}
.sb-phase-step.done{background:var(--grn)}
.sb-phase-step.active{background:var(--acc)}
.sb-projects{padding:4px 6px}
.sb-proj-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;font-size:12px;color:var(--txt2);cursor:pointer;transition:all .12s;margin-bottom:1px}
.sb-proj-item:hover{background:var(--bg3);color:var(--txt)}
.sb-proj-item.on{color:var(--acc)}
.sb-proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-foot{padding:10px 12px;border-top:.5px solid var(--bd);flex-shrink:0}
.sb-foot-row{display:flex;align-items:center;gap:8px}
.sb-foot-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#090908;flex-shrink:0}
.sb-foot-name{font-size:12px;font-weight:500;color:var(--txt)}
.sb-foot-role{font-size:10px;color:var(--txt3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.page-hdr{height:52px;padding:0 20px;display:flex;align-items:center;gap:12px;border-bottom:.5px solid var(--bd);flex-shrink:0}
.page-title{font-size:16px;font-weight:500;color:var(--txt);letter-spacing:-.01em;flex-shrink:0}
.search{display:flex;align-items:center;gap:8px;background:var(--bg3);border:.5px solid var(--bd2);border-radius:8px;padding:6px 11px;flex:1;max-width:320px}
.search input{background:transparent;border:none;outline:none;font-size:13px;color:var(--txt);font-family:'DM Sans',sans-serif;width:100%}
.search input::placeholder{color:var(--txt3)}
.page-body{flex:1;overflow-y:auto}

/* ── STATS ── */
.stats{display:grid;border-bottom:.5px solid var(--bd);flex-shrink:0}
.st{padding:12px 18px;border-right:.5px solid var(--bd)}
.st:last-child{border-right:none}
.st-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:4px}
.st-val{font-size:22px;font-weight:300;color:var(--txt);line-height:1;font-variant-numeric:tabular-nums}
.st-val.acc{color:var(--acc)}.st-val.grn{color:var(--grn)}.st-val.red{color:var(--red)}.st-val.blu{color:var(--blu)}

/* ── FILTERS ── */
.filters{display:flex;gap:5px;padding:10px 16px;flex-wrap:wrap;border-bottom:.5px solid var(--bd);flex-shrink:0}
.fp{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:.5px solid var(--bd2);color:var(--txt2);background:transparent;transition:all .12s;user-select:none;white-space:nowrap}
.fp:hover{border-color:var(--acc-bd);color:var(--acc)}
.fp.on{background:var(--acc-dim);border-color:var(--acc-bd);color:var(--acc)}
.f-sep{width:.5px;background:var(--bd2);margin:0 3px;align-self:stretch}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
.tbl th{padding:8px 13px;background:var(--bg3);font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;font-weight:600;text-align:left;border-bottom:.5px solid var(--bd);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:var(--txt)}
.tbl td{padding:9px 13px;border-bottom:.5px solid var(--bd);color:var(--txt2);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.012);cursor:pointer}
.td-title{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:1px}
.td-sub{font-size:10px;color:var(--txt3)}
.td-id{font-size:10px;color:var(--txt3);font-family:var(--font-mono)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b-open{background:var(--bg4);color:var(--txt2)}
.b-prog{background:var(--orbg);color:var(--or)}
.b-review{background:var(--bbg);color:var(--blu)}
.b-waiting{background:var(--ybg);color:var(--yel)}
.b-approved{background:var(--gbg);color:var(--grn)}
.b-resolved{background:var(--gbg);color:var(--grn)}
.b-verified{background:rgba(74,222,128,.2);color:var(--grn);font-weight:600}
.b-done{background:var(--gbg);color:var(--grn)}
.b-hold{background:var(--ybg);color:var(--yel)}
.b-high{background:var(--rbg);color:var(--red)}
.b-med{background:var(--ybg);color:var(--yel)}
.b-low{background:var(--gbg);color:var(--grn)}
.b-question{background:var(--bbg);color:var(--blu)}
.b-defect{background:var(--rbg);color:var(--red)}
.b-decision{background:var(--pbg);color:var(--pur)}
.b-task{background:var(--bg4);color:var(--txt2)}
.b-change{background:var(--ybg);color:var(--yel)}
.b-punch{background:var(--orbg);color:var(--or)}
.b-safety{background:var(--rbg);color:var(--red)}
.b-maint{background:var(--bbg);color:var(--blu)}
.b-house{background:var(--pbg);color:var(--pur)}

/* ── PANEL ── */
.panel{position:fixed;top:52px;right:0;bottom:0;width:440px;background:var(--bg2);border-left:.5px solid var(--bd2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:40}
.panel.open{transform:translateX(0)}
.panel-hdr{padding:13px 15px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-size:13px;font-weight:500;color:var(--txt)}
.cls-btn{background:var(--bg3);border:none;color:var(--txt3);font-size:15px;cursor:pointer;width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cls-btn:hover{color:var(--txt);background:var(--bg4)}
.panel-body{flex:1;overflow-y:auto;padding:14px}
.panel-foot{padding:11px 14px;border-top:.5px solid var(--bd);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.p-field{background:var(--bg3);border-radius:7px;padding:8px 10px;border:.5px solid transparent;cursor:pointer;transition:all .12s}
.p-field:hover{border-color:var(--acc-bd)}
.p-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;font-weight:600}
.p-val{font-size:12px;color:var(--txt)}
.p-sec{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin:12px 0 7px;display:flex;align-items:center;gap:7px}
.p-sec::after{content:'';flex:1;height:.5px;background:var(--bd2)}
.cm-item{display:flex;gap:8px;padding:9px 0;border-bottom:.5px solid var(--bd)}
.cm-item:last-child{border-bottom:none}
.cm-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#090908;flex-shrink:0}
.cm-author{font-size:11px;font-weight:500;color:var(--txt)}
.cm-time{font-size:10px;color:var(--txt3);margin-left:4px}
.cm-text{font-size:12px;color:var(--txt2);line-height:1.55;margin-top:2px}
.cm-input{width:100%;background:var(--bg3);border:.5px solid var(--bd2);border-radius:7px;padding:8px 10px;font-size:12px;color:var(--txt);outline:none;font-family:'DM Sans',sans-serif;resize:none;min-height:34px;line-height:1.5}
.cm-input:focus{border-color:var(--acc-bd)}

/* ── BUTTONS ── */
.btn{padding:7px 15px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-ghost{background:transparent;border:.5px solid var(--bd2);color:var(--txt2)}
.btn-ghost:hover{border-color:var(--acc-bd);color:var(--acc)}
.btn-acc{color:#090908;font-weight:600}
.btn-acc:hover{filter:brightness(1.08)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-danger:hover{border-color:var(--rbd);color:var(--red)}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.84);z-index:60;display:none;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--bg2);border:.5px solid var(--bd2);border-radius:14px;width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;position:relative}
.modal::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--acc-bd),transparent)}
.modal-hdr{padding:15px 17px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:500;color:var(--txt)}
.modal-body{padding:17px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.modal-foot{padding:11px 17px;border-top:.5px solid var(--bd);display:flex;gap:7px;flex-shrink:0}
.modal-foot .btn{flex:1;justify-content:center}
.fl{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.fi{width:100%;background:var(--bg3);border:.5px solid var(--bd2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--txt);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.fi:focus{border-color:var(--acc-bd)}
textarea.fi{resize:none;height:68px;line-height:1.5}
select.fi{appearance:none;cursor:pointer}
.fi-2col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.type-btn{padding:7px 10px;border-radius:7px;border:.5px solid var(--bd2);background:transparent;color:var(--txt2);font-size:11px;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;text-align:center}
.type-btn:hover{border-color:var(--acc-bd);color:var(--acc)}
.type-btn.on{background:var(--acc-dim);border-color:var(--acc-bd);color:var(--acc);font-weight:500}

/* ── DROPDOWN ── */
.dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:.5px solid var(--bd2);border-radius:10px;padding:5px;min-width:200px;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.dd-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:13px;color:var(--txt2);cursor:pointer;transition:all .12s}
.dd-item:hover{background:var(--bg3);color:var(--txt)}
.dd-item.on{color:var(--acc);background:var(--acc-dim)}
.dd-sep{height:.5px;background:var(--bd);margin:4px 0}
.dd-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:6px 10px 2px;font-weight:600}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
.dash-card{background:var(--bg2);border:.5px solid var(--bd2);border-radius:11px;overflow:hidden}
.dash-card-span2{grid-column:span 2}
.dash-card-span3{grid-column:span 3}
.dc-hdr{padding:11px 13px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.dc-title{font-size:11px;font-weight:600;color:var(--txt);text-transform:uppercase;letter-spacing:.05em}
.dc-action{font-size:11px;color:var(--acc);cursor:pointer;transition:opacity .15s}
.dc-action:hover{opacity:.7}
.dc-row{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:.5px solid var(--bd);cursor:pointer;transition:background .12s}
.dc-row:hover{background:var(--bg3)}
.dc-row:last-child{border-bottom:none}
.dc-row-title{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:1px}
.dc-row-sub{font-size:10px;color:var(--txt3)}

/* ── PUNCH LIST ── */
.punch-wrap{padding:14px 16px}
.room-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.room-card{background:var(--bg2);border:.5px solid var(--bd2);border-radius:9px;padding:12px;cursor:pointer;transition:all .15s}
.room-card:hover{border-color:var(--acc-bd);background:var(--bg3)}
.room-card.has-open{border-color:var(--rbd)}
.room-card.all-done{border-color:var(--gbd)}
.room-name{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:6px}
.room-counts{display:flex;gap:5px;flex-wrap:wrap}
.room-count{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600}

/* ── HANDOFF ── */
.handoff-wrap{padding:16px}
.handoff-hero{background:linear-gradient(135deg,var(--acc-dim),rgba(74,222,128,.05));border:.5px solid var(--acc-bd);border-radius:13px;padding:24px;margin-bottom:13px;position:relative;overflow:hidden}
.handoff-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,var(--acc-dim),transparent);pointer-events:none}
.hh-title{font-size:20px;font-weight:500;color:var(--txt);margin-bottom:6px;letter-spacing:-.02em}
.hh-sub{font-size:13px;color:var(--txt2);margin-bottom:18px;line-height:1.6}
.hc-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:rgba(0,0,0,.2);border-radius:7px;font-size:12px;color:var(--txt2);margin-bottom:5px}
.hc-cb{width:17px;height:17px;border-radius:4px;border:.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all .15s;cursor:pointer}
.hc-cb.done{background:var(--grn);border-color:var(--grn);color:#090908}
.hc-cb.done+span{text-decoration:line-through;color:var(--txt3)}
.handoff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.handoff-sec{background:var(--bg2);border:.5px solid var(--bd2);border-radius:10px;padding:13px}
.hs-title{font-size:10px;font-weight:600;color:var(--txt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hs-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--bd);font-size:12px;color:var(--txt2)}
.hs-item:last-child{border-bottom:none}
.hs-status{font-size:10px;font-weight:600}

/* ── INSIGHTS ── */
.insights-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
.insight-card{background:var(--bg2);border:.5px solid var(--bd2);border-radius:11px;padding:16px}
.ic-title{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.ic-big{font-size:36px;font-weight:200;color:var(--txt);letter-spacing:-.03em;line-height:1;margin-bottom:4px}
.ic-sub{font-size:12px;color:var(--txt3)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--txt2);width:80px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-val{font-size:11px;color:var(--txt2);width:48px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}

/* ── FINANCE ── */
.finance-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px}
.finance-card{background:var(--bg2);border:.5px solid var(--bd2);border-radius:11px;padding:14px}

/* ── ROLE SWITCHER ── */
.role-switcher{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:.5px solid var(--bd2);border-radius:12px;padding:8px;min-width:260px;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.rs-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:4px 8px;font-weight:600}
.rs-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .12s;margin-bottom:2px}
.rs-item:hover{background:var(--bg3)}
.rs-item.on{background:var(--acc-dim)}
.rs-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#090908;flex-shrink:0}
.rs-name{font-size:13px;font-weight:500;color:var(--txt)}
.rs-role{font-size:11px;color:var(--txt3)}
.rs-access{margin-left:auto;font-size:10px;color:var(--txt3)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:.5px solid var(--bd2);border-radius:10px;padding:11px 15px;display:flex;align-items:center;gap:10px;z-index:99;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateY(60px);opacity:0;transition:all .25s cubic-bezier(.4,0,.2,1);min-width:240px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1;pointer-events:all}
.toast-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}

/* ── MISC ── */
.empty{text-align:center;padding:48px 20px;color:var(--txt3);font-size:13px}
.prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;transition:width .6s}
.doc-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

function navTo(page){
  state.page=page;
  closePanel();
  renderSidebar();
  renderPage();
  renderTopbar();
}

function switchModule(mod){
  state.module=mod;
  state.page='dashboard';
  closePanel();
  renderTopbar();
  renderSidebar();
  renderPage();
}

function switchProp(pid){
  state.prop=pid;
  state.propDDOpen=false;
  state.page='dashboard';
  closePanel();
  renderTopbar();
  renderSidebar();
  renderPage();
}

function switchRole(rid){
  state.role=rid;
  state.roleDDOpen=false;
  var role=ROLES.find(function(r){return r.id===rid;});
  // Auto-switch to their first accessible module + prop
  if(role.canModules.indexOf(state.module)<0)state.module=role.canModules[0];
  if(role.canProps.indexOf(state.prop)<0)state.prop=role.canProps[0];
  state.page='dashboard';
  closePanel();
  renderTopbar();
  renderSidebar();
  renderPage();
  showToast('👤','Switched to '+role.name,'Viewing as '+role.role);
}

function renderPage(){
  var body=document.getElementById('page-body');
  var title=document.getElementById('page-title');
  var search=document.getElementById('search-bar');
  var actions=document.getElementById('page-hdr-actions');
  search.style.display='none';
  actions.innerHTML='';

  var titles={dashboard:'Dashboard',issues:state.module==='maintenance'?'Work orders':'Issues',
    documents:state.module==='build'?'Documents':state.module==='design'?'Drawings':'Documents',
    schedule:state.module==='maintenance'?'Calendar':'Schedule',
    budget:'Budget',directory:state.module==='maintenance'?'Vendors':'Directory',
    punch:'Punch list',handoff:'Handoff to Maintenance',insights:'Portfolio insights',finance:'Invoices'};
  title.textContent=titles[state.page]||state.page;

  if(state.page==='issues'||state.page==='punch'){
    search.style.display='flex';
  }

  var r=R();
  if(state.page==='issues'){
    actions.innerHTML='<button class="btn btn-acc btn-sm" onclick="openNewModal()" style="background:'+ACC()+'">+ New issue</button>';
  }
  if(state.page==='budget'){
    actions.innerHTML='<button class="btn btn-acc btn-sm" onclick="showToast(\'💰\',\'Change request created\',\'Pending approval\')" style="background:'+ACC()+'">+ Change request</button>';
  }
  if(state.page==='handoff'){
    actions.innerHTML='<button class="btn btn-acc btn-sm" onclick="switchModule(\'maintenance\')" style="background:'+ACC()+'">Open Maintenance →</button>';
  }

  switch(state.page){
    case 'dashboard': body.innerHTML=renderDashboard(); break;
    case 'issues': body.innerHTML=renderIssues(); break;
    case 'documents': body.innerHTML=renderDocs(); break;
    case 'schedule': body.innerHTML=renderSchedule(); break;
    case 'budget': body.innerHTML=renderBudget(); break;
    case 'directory': body.innerHTML=renderDir(); break;
    case 'punch': body.innerHTML=renderPunch(); break;
    case 'handoff': body.innerHTML=renderHandoff(); break;
    case 'insights': body.innerHTML=renderInsights(); break;
    case 'finance': body.innerHTML=renderFinance(); break;
    default: body.innerHTML='<div class="empty">Page not found</div>';
  }

  // All wiring done via delegated listener on page-body — no re-wiring needed
}

function bSt(s){
  var m={'open':'b-open','in-review':'b-review','waiting':'b-waiting','approved':'b-approved','resolved':'b-resolved','verified':'b-verified','done':'b-done','on-hold':'b-hold'};
  var l={'open':'Open','in-review':'In review','waiting':'Waiting','approved':'Approved','resolved':'Resolved','verified':'Verified ✓','done':'Done','on-hold':'On hold'};
  return '<span class="badge '+(m[s]||'b-open')+'">'+(l[s]||s)+'</span>';
}
function bType(t){
  var m={question:'b-question',defect:'b-defect',decision:'b-decision',task:'b-task',change:'b-change',punch:'b-punch',safety:'b-safety'};
  var l={question:'Question',defect:'Defect',decision:'Decision',task:'Task',change:'Change',punch:'Punch',safety:'Safety'};
  return '<span class="badge '+(m[t]||'b-task')+'">'+(l[t]||t)+'</span>';
}
function bPri(p){return '<span class="badge b-'+(p==='high'?'high':p==='med'?'med':'low')+'">'+(p==='high'?'High':p==='med'?'Medium':'Low')+'</span>';}

function renderIssues(){
  var role=R();
  var propIssues=ISSUES.filter(function(i){
    if(i.prop!==state.prop)return false;
    if(i.module!==state.module)return false;
    // Role scoping
    if(role.scopedAssigned)return i.assigned===role.name||i.assignedRole===role.id;
    if(role.scopedTypes&&role.scopedTypes.length)return role.scopedTypes.indexOf(i.type)>=0;
    return true;
  });
  var f=state.issueFilter;
  var filtered=propIssues.filter(function(i){
    if(f==='all')return true;
    if(f==='open')return i.status==='open';
    if(f==='review')return i.status==='in-review';
    if(f==='waiting')return i.status==='waiting';
    if(f==='resolved')return i.status==='resolved'||i.status==='verified';
    if(f==='high')return i.priority==='high';
    if(f.startsWith('t-'))return i.type===f.slice(2);
    return true;
  });

  var open=propIssues.filter(function(i){return i.status==='open';}).length;
  var review=propIssues.filter(function(i){return i.status==='in-review';}).length;
  var cost=propIssues.filter(function(i){return i.costImpact;}).length;

  var html='';
  html+='<div class="stats" style="grid-template-columns:repeat(6,1fr)">';
  html+='<div class="st"><div class="st-lbl">Total</div><div class="st-val">'+propIssues.length+'</div></div>';
  html+='<div class="st"><div class="st-lbl">Open</div><div class="st-val acc">'+open+'</div></div>';
  html+='<div class="st"><div class="st-lbl">In review</div><div class="st-val blu">'+review+'</div></div>';
  html+='<div class="st"><div class="st-lbl">Resolved</div><div class="st-val grn">'+propIssues.filter(function(i){return i.status==='resolved'||i.status==='verified';}).length+'</div></div>';
  html+='<div class="st"><div class="st-lbl">Cost impact</div><div class="st-val red">'+cost+'</div></div>';
  html+='<div class="st"><div class="st-lbl">Sched impact</div><div class="st-val red">'+propIssues.filter(function(i){return i.schedImpact;}).length+'</div></div>';
  html+='</div>';

  html+='<div class="filters">';
  [['all','All'],['open','Open'],['review','In review'],['waiting','Waiting'],['resolved','Resolved'],['high','High priority']].forEach(function(fp){
    html+='<div class="fp'+(state.issueFilter===fp[0]?' on':'')+'" data-f="'+fp[0]+'">'+fp[1]+'</div>';
  });
  html+='<div class="f-sep"></div>';
  ['question','defect','decision','task','change'].forEach(function(t){
    html+='<div class="fp'+(state.issueFilter==='t-'+t?' on':'')+'" data-f="t-'+t+'">'+(t==='question'?'❓':t==='defect'?'🔴':t==='decision'?'✅':t==='change'?'💰':'📋')+' '+t.charAt(0).toUpperCase()+t.slice(1)+'</div>';
  });
  html+='</div>';

  html+='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  html+='<th style="width:38px">ID</th><th>'+( state.module==='maintenance'?'Work order':'Issue')+'</th>';
  html+='<th style="width:90px">Type</th><th style="width:140px">Location</th>';
  html+='<th style="width:150px">Assigned</th><th style="width:80px">Priority</th>';
  html+='<th style="width:100px">Status</th><th style="width:72px">Due</th>';
  if(state.module==='build'){html+='<th style="width:36px" title="Cost impact">💰</th><th style="width:36px" title="Schedule impact">📅</th>';}
  html+='</tr></thead><tbody>';

  if(filtered.length){
    filtered.forEach(function(i){
      html+='<tr data-iid="'+i.id+'">';
      html+='<td class="td-id">#'+i.id+'</td>';
      html+='<td><div class="td-title">'+i.title+'</div></td>';
      html+='<td>'+bType(i.type)+'</td>';
      html+='<td style="font-size:11px;color:var(--txt2)">'+i.loc+'</td>';
      html+='<td style="font-size:11px;color:var(--txt2)">'+i.assigned+'</td>';
      html+='<td>'+bPri(i.priority)+'</td>';
      html+='<td>'+bSt(i.status)+'</td>';
      html+='<td style="font-size:11px;color:var(--txt3)">'+i.due+'</td>';
      if(state.module==='build'){
        html+='<td style="text-align:center">'+(i.costImpact?'<span style="color:var(--red)">●</span>':'<span style="opacity:.2">○</span>')+'</td>';
        html+='<td style="text-align:center">'+(i.schedImpact?'<span style="color:var(--red)">●</span>':'<span style="opacity:.2">○</span>')+'</td>';
      }
      html+='</tr>';
    });
  } else {
    html+='<tr><td colspan="10"><div class="empty">No issues match</div></td></tr>';
  }
  html+='</tbody></table></div>';
  return html;
}

function selIssue(id){
  var i=ISSUES.find(function(x){return x.id===id;});
  if(!i)return;
  state.selId=id;
  document.getElementById('panel-title').textContent=(state.module==='maintenance'?'Work order':'Issue')+' #'+id;

  var html='';
  html+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px">'+bType(i.type)+bPri(i.priority)+bSt(i.status)+'</div>';
  html+='<div style="font-size:14px;font-weight:500;color:var(--txt);margin-bottom:8px;line-height:1.4">'+i.title+'</div>';
  html+='<div style="font-size:13px;color:var(--txt2);line-height:1.65;background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:12px">'+i.desc+'</div>';
  html+='<div class="p-grid">';

  html+='<div class="p-field"><div class="p-lbl">Assigned to</div><div class="p-val" style="font-size:11px">'+i.assigned+'</div></div>';
  html+='<div class="p-field"><div class="p-lbl">Created</div><div class="p-val" style="font-size:11px">'+i.created+'</div></div>';
  html+='<div class="p-field"><div class="p-lbl">Due</div><div class="p-val" style="font-size:11px">'+i.due+'</div></div>';
  html+='</div>';
  if(i.costImpact||i.schedImpact){
    html+='<div style="display:flex;gap:6px;margin-bottom:11px">';
    if(i.costImpact)html+='<div style="background:var(--rbg);border:.5px solid var(--rbd);border-radius:7px;padding:5px 10px;font-size:11px;color:var(--red)">💰 Cost impact</div>';
    if(i.schedImpact)html+='<div style="background:var(--rbg);border:.5px solid var(--rbd);border-radius:7px;padding:5px 10px;font-size:11px;color:var(--red)">📅 Schedule impact</div>';
    html+='</div>';
  }
  html+='<div class="p-sec">Comments</div>';
  if(i.comments&&i.comments.length){
    i.comments.forEach(function(c){
      html+='<div class="cm-item"><div class="cm-av" style="background:'+c.color+'">'+c.initials+'</div><div><div><span class="cm-author">'+c.author+'</span><span class="cm-time">· '+c.time+'</span></div><div class="cm-text">'+c.text+'</div></div></div>';
    });
  } else {
    html+='<div style="font-size:12px;color:var(--txt3);padding:6px 0">No comments yet</div>';
  }
  document.getElementById('panel-body').innerHTML=html;

  var statusFlow={'open':'in-review','in-review':'resolved','resolved':'verified','verified':'open','waiting':'open'};
  var statusLabel={'open':'Mark in review','in-review':'Mark resolved','resolved':'Verify ✓','verified':'Reopen','waiting':'Mark open'};
  var ns=statusFlow[i.status]||'open';
  var nl=statusLabel[i.status]||'Update';
  var acc=ACC();

  var foot=document.getElementById('panel-foot');
  foot.innerHTML='<div style="display:flex;gap:6px"><textarea class="cm-input" id="pc-txt" placeholder="Add a comment..."></textarea></div>';
  foot.innerHTML+='<div style="display:flex;gap:6px"><button class="btn btn-ghost" style="flex:1" onclick="closePanel()">Close</button><button class="btn btn-ghost btn-sm" id="pc-post">Post</button><button class="btn btn-acc" id="pc-status" style="background:'+acc+'">'+nl+'</button></div>';

  var pcPost=document.getElementById('pc-post');
  if(pcPost)pcPost.addEventListener('click',function(){
    var inp=document.getElementById('pc-txt');
    if(!inp||!inp.value.trim())return;
    i.comments.push({author:R().name,initials:R().initials,color:R().color,time:'Just now',text:inp.value.trim()});
    selIssue(id);
  });
  var pcSt=document.getElementById('pc-status');
  if(pcSt)pcSt.addEventListener('click',function(){
    i.status=ns;selIssue(id);
    if(state.page==='issues')document.getElementById('page-body').innerHTML=renderIssues();
    document.getElementById('page-body').querySelectorAll('.tbl tr[data-iid]').forEach(wireIssueClik);
    showToast('✓','Status updated to '+ns,null);
  });

  document.getElementById('panel').classList.add('open');
}

// PUNCH LIST
// ═══════════════════════════════════════════════════════════════════════════════
function renderPunch(){
  var total=PUNCH_ROOMS.reduce(function(a,r){return a+r.items.length;},0);
  var open=PUNCH_ROOMS.reduce(function(a,r){return a+r.items.filter(function(i){return i.status==='open';}).length;},0);
  var resolved=PUNCH_ROOMS.reduce(function(a,r){return a+r.items.filter(function(i){return i.status==='resolved';}).length;},0);
  var verified=PUNCH_ROOMS.reduce(function(a,r){return a+r.items.filter(function(i){return i.status==='verified';}).length;},0);
  var pct=Math.round(verified/total*100);
  var acc=ACC();

  var html='<div style="padding:14px 16px">';
  // Summary
  html+='<div style="background:var(--bg2);border:.5px solid var(--bd2);border-radius:11px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:20px">';
  html+='<div style="flex:1"><div style="font-size:11px;color:var(--txt3);margin-bottom:4px">Punch list progress</div>';
  html+='<div class="prog-bar" style="height:5px;margin-top:0"><div class="prog-fill" style="width:'+pct+'%;background:var(--grn)"></div></div>';
  html+='<div style="font-size:11px;color:var(--txt3);margin-top:5px">'+verified+' verified · '+resolved+' resolved · '+open+' open</div></div>';
  ['open','resolved','verified'].forEach(function(s,i){
    var colors=['var(--red)','var(--yel)','var(--grn)'];
    var vals=[open,resolved,verified];
    html+='<div style="text-align:center;padding:0 16px;border-left:.5px solid var(--bd)"><div style="font-size:26px;font-weight:200;color:'+colors[i]+'">'+vals[i]+'</div><div style="font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em">'+s+'</div></div>';
  });
  html+='<div style="border-left:.5px solid var(--bd);padding-left:16px">';
  html+='<div style="font-size:11px;color:var(--txt3);margin-bottom:6px">Handoff status</div>';
  html+=(open===0?'<span class="badge b-approved">Ready ✓</span>':'<span class="badge b-high">'+open+' items blocking</span>');
  html+='</div></div>';

  // Role note
  if(R().id==='gc'){
    html+='<div style="background:var(--ybg);border:.5px solid var(--ybd);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--yel);margin-bottom:12px">⚠ You can mark items resolved. Only the owner\'s rep can verify.</div>';
  }

  // Room grid
  html+='<div class="room-grid">';
  PUNCH_ROOMS.forEach(function(room,ri){
    var roomOpen=room.items.filter(function(i){return i.status==='open';}).length;
    var roomVerified=room.items.filter(function(i){return i.status==='verified';}).length;
    var allDone=roomOpen===0&&roomVerified===room.items.length;
    html+='<div class="room-card'+(roomOpen>0?' has-open':allDone?' all-done':'')+'">';
    html+='<div class="room-name">'+room.name+'</div>';
    html+='<div class="room-counts">';
    if(roomOpen>0)html+='<span class="room-count" style="background:var(--rbg);color:var(--red)">'+roomOpen+' open</span>';
    var roomRes=room.items.filter(function(i){return i.status==='resolved';}).length;
    if(roomRes>0)html+='<span class="room-count" style="background:var(--ybg);color:var(--yel)">'+roomRes+' resolved</span>';
    if(roomVerified>0)html+='<span class="room-count" style="background:var(--gbg);color:var(--grn)">'+roomVerified+' verified</span>';
    if(room.items.length===0)html+='<span class="room-count" style="background:var(--gbg);color:var(--grn)">Clear ✓</span>';
    html+='</div></div>';
  });
  html+='</div>';

  // Item list
  html+='<div style="background:var(--bg2);border:.5px solid var(--bd2);border-radius:11px;overflow:hidden">';
  html+='<div style="padding:10px 14px;border-bottom:.5px solid var(--bd);font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em">All punch items — click to advance status</div>';
  PUNCH_ROOMS.forEach(function(room,ri){
    html+='<div style="padding:7px 14px 3px;background:var(--bg3);font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em">'+room.name+'</div>';
    room.items.forEach(function(item,ii){
      var sc=item.status==='open'?'b-high':item.status==='in-review'?'b-review':item.status==='resolved'?'b-med':'b-verified';
      var canVerify=R().id==='owner'||R().id==='owners-rep';
      var canAdvance=item.status!=='verified'||(canVerify);
      html+='<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:.5px solid var(--bd);cursor:pointer;transition:background .12s" data-punch-open data-room="'+ri+'" data-item="'+ii+'" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'\'>';
      html+='<div style="flex:1"><div style="font-size:12px;font-weight:500;color:var(--txt)">'+item.title+'</div><div style="font-size:10px;color:var(--txt3)">'+item.assigned+' · '+room.name+'</div></div>';
      html+='<span class="badge b-'+(item.priority==='high'?'high':item.priority==='med'?'med':'low')+'" style="font-size:9px">'+item.priority+'</span>';
      html+='<span class="badge '+sc+'" style="font-size:9px">'+item.status+'</span>';
      if(item.photo)html+='<span style="font-size:11px">📷</span>';
      html+='<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" style="opacity:.3"><path d="M6 3l5 5-5 5"/></svg>';
      html+='</div>';
    });
  });
  html+='</div>';
  html+='</div>';
  return html;
}

  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-size:12px;font-weight:500;color:var(--txt)">Handoff checklist</div><div style="font-size:12px;color:'+acc+';font-weight:500">'+done+' / '+HANDOFF_CHECKS.length+' ('+pct+'%)</div></div>';

  html+='</div>';
  html+='</div>';

  html+='<div class="handoff-grid">';

  // Transfers
  html+='<div class="handoff-sec"><div class="hs-title">📦 What transfers</div>';

    ['Equipment manuals',true],
    ['As-built drawings',false],
    ['Open issues → Work orders',true],

  transfers.forEach(function(t){

  html+='</div>';

  // Open issues → WOs
  var openIssues=ISSUES.filter(function(i){return i.prop===state.prop&&i.status!=='resolved'&&i.status!=='verified';});

  return html;

function submitNewIssue(){
  var title=document.getElementById('ni-title').value.trim();
  if(!title)return;
  var phase=state.module==='build'&&newIssueType==='punch'?'punch':'build';
  var newIssue={
    id:state.nextId++,prop:state.prop,module:state.module,phase:phase,
    title:title,type:newIssueType,
    loc:document.getElementById('ni-loc').value||'Unspecified',
    assigned:document.getElementById('ni-assign').value||R().name,
    assignedRole:state.role,
    priority:document.getElementById('ni-pri').value,
    status:'open',
    costImpact:!!(document.getElementById('ni-cost-btn')&&document.getElementById('ni-cost-btn').classList.contains('on')),
    schedImpact:!!(document.getElementById('ni-sched-btn')&&document.getElementById('ni-sched-btn').classList.contains('on')),
    desc:document.getElementById('ni-desc').value||'No description.',
    comments:[],created:'Apr 30',due:document.getElementById('ni-due').value||'TBD'
  };
  ISSUES.unshift(newIssue);
  closeModal();
  renderPage();
  renderSidebar();
  showToast('✓','#'+newIssue.id+' created','Issue added successfully');
}


function selPunchItem(ri,ii){
  var room=PUNCH_ROOMS[ri];
  if(!room)return;
  var item=room.items[ii];
  if(!item)return;
  var canVerify=R().id==='owner'||R().id==='owners-rep';
  var canGC=R().id==='gc'||R().id==='owners-rep'||R().id==='owner';
  var acc=ACC();

  document.getElementById('panel-title').textContent='Punch item — '+room.name;

  var sc=item.status==='open'?'b-high':item.status==='in-review'?'b-review':item.status==='resolved'?'b-med':'b-verified';
  var html='';
  html+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px">';
  html+='<span class="badge b-punch">Punch</span>';
  html+='<span class="badge b-'+(item.priority==='high'?'high':item.priority==='med'?'med':'low')+'">'+item.priority.charAt(0).toUpperCase()+item.priority.slice(1)+'</span>';
  html+='<span class="badge '+sc+'">'+item.status+'</span>';
  html+='</div>';
  html+='<div style="font-size:15px;font-weight:500;color:var(--txt);margin-bottom:8px;line-height:1.4">'+item.title+'</div>';
  html+='<div style="font-size:13px;color:var(--txt2);line-height:1.65;background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:12px">'+item.desc+'</div>';

  html+='<div class="p-grid">';
  html+='<div class="p-field"><div class="p-lbl">Room</div><div class="p-val" style="font-size:11px">'+room.name+'</div></div>';
  html+='<div class="p-field"><div class="p-lbl">Assigned to</div><div class="p-val" style="font-size:11px">'+item.assigned+'</div></div>';
  html+='<div class="p-field"><div class="p-lbl">Created</div><div class="p-val" style="font-size:11px">'+item.created+'</div></div>';
  html+='<div class="p-field"><div class="p-lbl">Due</div><div class="p-val" style="font-size:11px">'+item.due+'</div></div>';
  html+='</div>';

  // Photo placeholder
  if(item.photo){
    html+='<div style="background:var(--bg3);border:.5px solid var(--bd2);border-radius:9px;height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;cursor:pointer">';
    html+='<div style="font-size:28px">📷</div>';
    html+='<div style="font-size:12px;color:var(--txt3)">Photo attached — tap to view</div>';
    html+='<div style="font-size:10px;color:var(--txt4)">Before / After comparison</div>';
    html+='</div>';
  } else {
    html+='<div style="background:var(--bg3);border:.5px dashed var(--bd2);border-radius:9px;height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;margin-bottom:12px;cursor:pointer;opacity:.5">';
    html+='<div style="font-size:18px">📷</div>';
    html+='<div style="font-size:11px;color:var(--txt3)">Add photo</div>';
    html+='</div>';
  }

  // Comments
  html+='<div class="p-sec">Comments</div>';
  if(item.comments&&item.comments.length){
    item.comments.forEach(function(c){
      html+='<div class="cm-item"><div class="cm-av" style="background:'+c.color+'">'+c.initials+'</div><div><div><span class="cm-author">'+c.author+'</span><span class="cm-time">· '+c.time+'</span></div><div class="cm-text">'+c.text+'</div></div></div>';
    });
  } else {
    html+='<div style="font-size:12px;color:var(--txt3);padding:6px 0">No comments yet</div>';
  }

  document.getElementById('panel-body').innerHTML=html;

  // Footer — status actions
  var foot=document.getElementById('panel-foot');
  foot.innerHTML='';

  // Comment row
  var commentRow=document.createElement('div');
  commentRow.style.cssText='display:flex;gap:6px';
  commentRow.innerHTML='<textarea class="cm-input" id="punch-cm-txt" placeholder="Add a comment..." style="flex:1"></textarea>';
  var postBtn=document.createElement('button');
  postBtn.className='btn btn-ghost btn-sm';
  postBtn.textContent='Post';
  postBtn.addEventListener('click',function(){
    var inp=document.getElementById('punch-cm-txt');
    if(!inp||!inp.value.trim())return;
    item.comments.push({author:R().name,initials:R().initials,color:R().color,time:'Just now',text:inp.value.trim()});
    selPunchItem(ri,ii);
  });
  commentRow.appendChild(postBtn);
  foot.appendChild(commentRow);

  // Action buttons
  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:6px';

  var closeBtn=document.createElement('button');
  closeBtn.className='btn btn-ghost';
  closeBtn.style.flex='1';
  closeBtn.textContent='Close';
  closeBtn.addEventListener('click',closePanel);
  btnRow.appendChild(closeBtn);

  // Advance status (GC can mark resolved, cannot verify)
  if(item.status!=='verified'&&(canGC||canVerify)){
    var cycle=canVerify?['open','in-review','resolved','verified']:['open','in-review','resolved'];
    var cur=cycle.indexOf(item.status);
    var ns=cycle[(cur+1)%cycle.length];
    var nl=ns==='in-review'?'Mark in review':ns==='resolved'?'Mark resolved':ns==='verified'?'Verify ✓':'Reopen';
    var advBtn=document.createElement('button');
    advBtn.className='btn btn-acc';
    advBtn.style.cssText='flex:1;background:'+acc+(ns==='verified'?';background:var(--grn)':'');
    advBtn.textContent=nl;
    advBtn.addEventListener('click',function(){
      item.status=ns;
      document.getElementById('page-body').innerHTML=renderPunch();
      renderSidebar();
      selPunchItem(ri,ii);
      showToast('✓','Punch item updated','Marked as '+ns);
    });
    btnRow.appendChild(advBtn);
  }

  // Verify button (only for owner/rep, only when resolved)
  if(item.status==='resolved'&&canVerify){
    var verBtn=document.createElement('button');
    verBtn.className='btn btn-acc';
    verBtn.style.cssText='flex:1;background:var(--grn)';
    verBtn.textContent='Verify ✓';
    verBtn.addEventListener('click',function(){
      item.status='verified';
      document.getElementById('page-body').innerHTML=renderPunch();
      renderSidebar();
      selPunchItem(ri,ii);
      showToast('✓','Item verified','Verified by '+R().name);
    });
    btnRow.appendChild(verBtn);
  }

  foot.appendChild(btnRow);
  document.getElementById('panel').classList.add('open');
}

// ═══════════════════════════════════════════════════════════════════════════════
// PANEL / MODAL / TOAST
// ═══════════════════════════════════════════════════════════════════════════════
function closePanel(){document.getElementById('panel').classList.remove('open');state.selId=null;}
function closeModal(){document.getElementById('modal').classList.remove('open');}

var toastTimer=null;
function showToast(icon,title,sub){
  document.getElementById('toast-icon').textContent=icon||'✓';
  document.getElementById('toast-title').textContent=title||'';
  document.getElementById('toast-sub').textContent=sub||'';
  var t=document.getElementById('toast');
  t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},4000);
}

  // placeholder — wire to renderIssues filtering
}

// ═══════════════════════════════════════════════════════════════════════════════
// DELEGATED EVENT LISTENERS — single listener handles all dynamic content
// ═══════════════════════════════════════════════════════════════════════════════
document.getElementById('page-body').addEventListener('click',function(e){
  // Punch open panel
  var pt=e.target.closest('[data-punch-open]');
  if(pt){
    var ri=parseInt(pt.dataset.room);
    var ii=parseInt(pt.dataset.item);
    selPunchItem(ri,ii);
    return;
  }
  // Handoff checklist
  var hc=e.target.closest('[data-hc]');
  if(hc){
    var i=parseInt(hc.dataset.hc);
    HANDOFF_CHECKS[i].done=!HANDOFF_CHECKS[i].done;
    document.getElementById('page-body').innerHTML=renderHandoff();
    return;
  }
  // Issue filter pills
  var fp=e.target.closest('.fp[data-f]');
  if(fp){
    state.issueFilter=fp.dataset.f;
    document.getElementById('page-body').innerHTML=renderIssues();
    return;
  }
  // Issue table rows
  var irow=e.target.closest('tr[data-iid]');
  if(irow){
    selIssue(parseInt(irow.dataset.iid));
    return;
  }
  // Dashboard nav links
  var da=e.target.closest('[data-nav]');
  if(da){
    navTo(da.dataset.nav);
    return;
  }
});
