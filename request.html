<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Frame Marine — Request Portal</title>
  <meta name="theme-color" content="#010102">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #010102;
      --bg2:  #0c0c0e;
      --bg3:  #141417;
      --bd:   rgba(255,255,255,.09);
      --txt:  #f7f8f8;
      --txt2: #a0a0a8;
      --txt3: #5a5a64;
      --or:   #5e6ad2;
      --or2:  #828fff;
      --grn:  #4ade80;
      --red:  #f87171;
      --r10:  10px;
      --font: 'DM Sans', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--font);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      border-bottom: .5px solid var(--bd);
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-mark {
      width: 28px;
      height: 28px;
      background: var(--or);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--txt);
    }
    .topbar-name span { color: var(--or2); }

    /* ── LAYOUT ── */
    .page-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--bg2);
      border: .5px solid var(--bd);
      border-radius: 14px;
      overflow: hidden;
    }
    .card-head {
      padding: 28px 28px 24px;
      border-bottom: .5px solid var(--bd);
    }
    .vessel-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.04em;
      color: var(--txt);
      margin-bottom: 6px;
    }
    .vessel-desc {
      font-size: 13px;
      color: var(--txt2);
      line-height: 1.6;
    }

    /* ── FORM ── */
    .form-wrap { padding: 24px 28px 28px; }

    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--txt2);
      letter-spacing: .01em;
      margin-bottom: 6px;
    }
    label .req { color: var(--red); margin-left: 2px; }

    input, textarea, select {
      width: 100%;
      background: var(--bg3);
      border: .5px solid var(--bd);
      border-radius: 8px;
      color: var(--txt);
      font-family: var(--font);
      font-size: 14px;
      padding: 11px 13px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--or);
    }
    input::placeholder, textarea::placeholder {
      color: var(--txt3);
    }
    textarea { resize: vertical; min-height: 96px; }

    /* ── PHOTO UPLOAD ── */
    .photo-drop {
      border: .5px dashed rgba(255,255,255,.18);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      color: var(--txt3);
      font-size: 13px;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .photo-drop:hover { border-color: var(--or); background: rgba(94,106,210,.06); }
    .photo-drop input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%; padding: 0;
    }
    .photo-drop svg { margin-bottom: 6px; }
    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .photo-thumb {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: .5px solid var(--bd);
    }

    /* ── SUBMIT ── */
    .submit-btn {
      width: 100%;
      height: 46px;
      background: var(--or);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      letter-spacing: -.01em;
      cursor: pointer;
      transition: opacity .15s, transform .12s;
      margin-top: 4px;
    }
    .submit-btn:hover { opacity: .9; }
    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── SUCCESS ── */
    .success-wrap {
      display: none;
      padding: 48px 28px;
      text-align: center;
    }
    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(74,222,128,.14);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
    }
    .success-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -.03em;
      color: var(--txt);
      margin-bottom: 8px;
    }
    .success-sub {
      font-size: 13px;
      color: var(--txt2);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .submit-another {
      background: transparent;
      border: .5px solid var(--bd);
      border-radius: 8px;
      color: var(--txt2);
      font-family: var(--font);
      font-size: 13px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background .12s;
    }
    .submit-another:hover { background: var(--bg3); }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: var(--txt3);
    }

    @media (max-width: 600px) {
      .page-wrap { padding: 24px 0 60px; align-items: stretch; }
      .card { border-radius: 0; border-left: none; border-right: none; border-top: none; }
      .card-head, .form-wrap { padding-left: 20px; padding-right: 20px; }
      .topbar { padding: 14px 20px; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">
    <div class="topbar-mark">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M2 12l3-8h6l3 8H2z"/><path d="M8 4V2"/></svg>
    </div>
    <div class="topbar-name">Frame <span>Marine</span></div>
  </div>
</header>

<main class="page-wrap">
  <div class="card">

    <div class="card-head">
      <div class="vessel-name" id="vessel-display">Submit a Request</div>
      <div class="vessel-desc">Use this form to report an issue or make a request. Our team will review it and respond as soon as possible.</div>
    </div>

    <!-- FORM -->
    <div class="form-wrap" id="form-wrap">
      <form id="req-form" onsubmit="submitRequest(event)">

        <div class="field">
          <label>What's the issue? <span class="req">*</span></label>
          <input type="text" id="f-title" placeholder="e.g. Hot tub not heating" required maxlength="120">
        </div>

        <div class="field">
          <label>Tell us more</label>
          <textarea id="f-desc" placeholder="Any extra details that would help our team…"></textarea>
        </div>

        <div class="field">
          <label>Location on vessel</label>
          <input type="text" id="f-location" placeholder="e.g. Owner cabin, Main salon, Upper deck…">
        </div>

        <div class="field">
          <label>Add photos</label>
          <div class="photo-drop" id="photo-drop">
            <input type="file" id="f-photos" accept="image/*" multiple onchange="previewPhotos(this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--txt3)"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <div>Tap to add photos</div>
          </div>
          <div class="photo-preview" id="photo-preview"></div>
        </div>

        <div class="field">
          <label>Your name &amp; contact <span class="req">*</span></label>
          <input type="text" id="f-contact" placeholder="Name · email or phone" required>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Submit Request</button>
      </form>
    </div>

    <!-- SUCCESS -->
    <div class="success-wrap" id="success-wrap">
      <div class="success-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <div class="success-title">Request submitted!</div>
      <div class="success-sub">Thank you — our team has been notified and will get back to you shortly.</div>
      <button class="submit-another" onclick="resetForm()">Submit another request</button>
    </div>

  </div>
</main>

<div class="footer">Powered by Frame Marine</div>

<script>
  // Set vessel name from URL param
  const params = new URLSearchParams(location.search);
  const vesselParam = params.get('vessel') || params.get('v');
  if (vesselParam) {
    document.getElementById('vessel-display').textContent = decodeURIComponent(vesselParam);
  }

  function previewPhotos(input) {
    const preview = document.getElementById('photo-preview');
    preview.innerHTML = '';
    Array.from(input.files).forEach(file => {
      const img = document.createElement('img');
      img.className = 'photo-thumb';
      img.src = URL.createObjectURL(file);
      preview.appendChild(img);
    });
  }

  function submitRequest(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    const req = {
      id: 'REQ-' + Date.now(),
      vessel: vesselParam || 'v1',
      title: document.getElementById('f-title').value.trim(),
      desc: document.getElementById('f-desc').value.trim(),
      location: document.getElementById('f-location').value.trim(),
      contact: document.getElementById('f-contact').value.trim(),
      submitted: new Date().toISOString(),
      status: 'new',
      woId: null,
    };

    // Save to localStorage (same-device demo sync)
    try {
      const existing = JSON.parse(localStorage.getItem('fm_requests') || '[]');
      existing.unshift(req);
      localStorage.setItem('fm_requests', JSON.stringify(existing));
    } catch(err) {}

    setTimeout(() => {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('success-wrap').style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Submit Request';
    }, 600);
  }

  function resetForm() {
    document.getElementById('req-form').reset();
    document.getElementById('photo-preview').innerHTML = '';
    document.getElementById('form-wrap').style.display = 'block';
    document.getElementById('success-wrap').style.display = 'none';
  }
</script>

</body>
</html>
